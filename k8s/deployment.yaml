apiVersion: apps/v1
kind: Deployment
metadata:
  name: tritondft
  namespace: datahub-llm
  labels:
    k8s-app: tritondft
spec:
  # API is now lightweight (enqueue + status only — no agent). Safe to run
  # multiple replicas and roll without downtime.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      k8s-app: tritondft
  template:
    metadata:
      labels:
        k8s-app: tritondft
    spec:
      priorityClassName: opportunistic
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: feature.node.kubernetes.io/pci-10de.present
                operator: NotIn
                values: ["true"]
      containers:
      - name: tritondft
        image: docker.io/yil384/tritondft:v33
        imagePullPolicy: IfNotPresent
        command: ["/usr/bin/tini", "--", "uvicorn"]
        args:
          - "server:app"
          - "--host=0.0.0.0"
          - "--port=8000"
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: tritondft-secrets, key: DATABASE_URL } }
        - name: JWT_SECRET
          valueFrom: { secretKeyRef: { name: tritondft-secrets, key: JWT_SECRET } }
        - name: ADMIN_EMAILS
          valueFrom: { secretKeyRef: { name: tritondft-secrets, key: ADMIN_EMAILS } }
        - name: RESEND_API_KEY
          valueFrom: { secretKeyRef: { name: tritondft-secrets, key: RESEND_API_KEY } }
        - name: EMAIL_FROM
          valueFrom: { secretKeyRef: { name: tritondft-secrets, key: EMAIL_FROM } }
        - name: FRONTEND_BASE_URL
          valueFrom: { secretKeyRef: { name: tritondft-secrets, key: FRONTEND_BASE_URL } }
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 30
        # Read-only mount of the shared run-output PVC so the API can serve
        # artifact files/zips that the workers wrote.
        volumeMounts:
        - name: workdir
          mountPath: /workspace/tmp
          readOnly: true
      volumes:
      - name: workdir
        persistentVolumeClaim:
          claimName: tritondft-workdir
